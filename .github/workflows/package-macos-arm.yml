name: Package - macOS - arm

on:
  #push:
  #  branches: [ master ]

  #pull_request:
  #  branches: [ master ]

  workflow_dispatch:

  workflow_call:

jobs:
  macos:
    name: macOS Apps
    runs-on: macos-14
    strategy:
      matrix:
        build:
          - d1
          - d2

    steps:
      - name: Clone repository
        uses: actions/checkout@v6

      - name: Fetch tags
        run: git fetch --tags

      - name: Install build dependencies
        run: brew install --formula dylibbundler

      - name: Install library dependencies
        run: brew install --formula sdl2 sdl12-compat physfs glew libogg mpg123 flac fluid-synth ninja

      - name: Build and package
        run: |
          cd ${{ matrix.build }}
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=RelWithDebInfo
          cmake --build build
          cpack -G Bundle

      - name: Store artifact
        uses: actions/upload-artifact@v7
        with:
          name: macos-arm
          path: "*.dmg"
