name: Package - macOS - arm

on:
  #push:
  #  branches: [ master ]

  #pull_request:
  #  branches: [ master ]

  workflow_dispatch:

  workflow_call:

jobs:
  macos:
    name: macOS Apps
    runs-on: macos-14
    steps:
      - name: Clone repository
        uses: actions/checkout@v3

      - name: Fetch tags
        run: git fetch --tags

      - name: Install build dependencies
        run: brew install --formula dylibbundler

      - name: Install library dependencies
        run: brew install --formula sdl2 sdl12-compat physfs glew libogg mpg123 flac fluid-synth ninja

      - name: Build and package
        run: |
          for build in "d1 d2"; do
            cmake -B build-${build}x -S ${build} -G Ninja -DCMAKE_BUILD_TYPE=RelWithDebInfo
            cmake --build build-${build}x
            cd build-${build}
            cpack -G Bundle
            cd ..
          done

      - name: Store artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm
          path: "**/*.dmg"
